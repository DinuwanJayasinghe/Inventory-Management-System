# =============================================================
#  FILE LOCATION: Inventry-Management-System/docker/nginx/default.conf
#  Nginx: serves Laravel API on port 80 (mapped to host :8000)
# =============================================================

server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/ims_access.log;
    error_log  /var/log/nginx/ims_error.log;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── CORS (for React frontend) ─────────────────────────────
    add_header Access-Control-Allow-Origin  "http://localhost:5173" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

    # Handle preflight OPTIONS requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Static files ──────────────────────────────────────────
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|woff|woff2)$ {
        expires max;
        log_not_found off;
        try_files $uri $uri/ =404;
    }

    # ── Storage (uploaded images) ─────────────────────────────
    location /storage {
        alias /var/www/storage/app/public;
    }

    # ── All requests → Laravel index.php ─────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass  backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size  16k;
        fastcgi_buffers      4 16k;
    }

    # ── Block hidden files ────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
